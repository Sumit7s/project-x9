<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Kishmish ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            color: white;
            background-color: #1a1a1a;
        }

        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('kishmish.jpg') center/cover no-repeat;
            filter: brightness(0.6);
            z-index: -1;
            transition: background 0.8s ease-in-out;
        }

        #content {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .box:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.15);
        }

        h2 {
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .btn-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .yes { background: #ff4d6d; color: white; }
        .no { background: #595959; color: white; }

        button:active { transform: scale(0.9); }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            user-select: none;
            z-index: 10;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="love-song.mp3" type="audio/mpeg">
    </audio>

    <div id="bg"></div>

    <div id="content">
        <h2 id="mainTitle">Hey Kishmish... ❤️</h2>

        <div class="box" onclick="nextMessage()" id="msg">
            Tap to begin ❤️
        </div>

        <div id="proposal" style="display:none; margin-top: 20px;">
            <h2 id="proposalText">Will you marry me? 💍</h2>
            <div class="btn-container">
                <button class="yes" id="yesBtn" onclick="yes()">Yes ❤️</button>
                <button class="no" id="noBtn" onclick="no()">No 😏</button>
            </div>
            <p id="answer" style="font-size: 22px; font-weight: bold; margin-top: 25px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);"></p>
        </div>
    </div>

<script>
    let messages = [
        "Kishmish, you are my favorite person ❤️",
        "You make my world brighter 🌸",
        "I fall for you every day ❤️",
        "Life is beautiful because of you 🌙",
        "You are my everything ❤️"
    ];

    let noLines = [
        "Are you sure? 💍",
        "Think again 😏",
        "I’ll wait forever ❤️",
        "Don’t break my heart 💔",
        "Last chance 😄"
    ];

    let count = 0;
    let noIndex = 0;
    let musicStarted = false;

    function nextMessage() {
        // Start music on the first click
        if (!musicStarted) {
            let music = document.getElementById("bgMusic");
            music.play().catch(e => console.log("Music play blocked until interaction"));
            musicStarted = true;
        }

        if(count >= messages.length){
            document.getElementById("proposal").style.display = "block";
            document.getElementById("msg").style.display = "none";
            document.getElementById("mainTitle").style.display = "none";
            return;
        }

        document.getElementById("msg").innerText = messages[count];
        count++;
    }

    function yes(){
        // Change background image
        document.getElementById("bg").style.backgroundImage = "url('yes.jpg')";
        document.getElementById("answer").innerText = "You just got the best husband! I love you! ❤️";
        document.getElementById("proposalText").innerText = "YES! 💍✨";
        
        // Hide buttons
        document.getElementById("yesBtn").style.display = "none";
        document.getElementById("noBtn").style.display = "none";

        // Celebration: Shower of hearts
        setInterval(() => {
            let h = document.createElement("div");
            h.innerText = "❤️";
            h.className = "heart";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 20) + "px";
            h.style.animationDuration = (Math.random() * 2 + 2) + "s";
            
            document.body.appendChild(h);

            // Clean up memory
            setTimeout(() => h.remove(), 4000);
        }, 150);
    }

    function no(){
        // Cycle through "No" messages
        document.getElementById("proposalText").innerText = noLines[noIndex];
        noIndex = (noIndex + 1) % noLines.length;
        
        // Make the "Yes" button grow to make it harder to say no!
        let yesBtn = document.getElementById("yesBtn");
        let currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
        yesBtn.style.fontSize = (currentSize + 5) + "px";
        yesBtn.style.padding = (currentSize + 10) + "px";
    }
</script>

</body>
</html>
